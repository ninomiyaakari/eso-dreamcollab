<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>打协力吗？</title>
<style>
  :root {
    --purple: #8B5CF6;
    --purple-light: #C4B5FD;
    --purple-pale: #EDE9FE;
    --rose: #FB7185;
    --rose-light: #FECDD3;
    --rose-pale: #FFF1F2;
    --indigo: #6366F1;
    --yellow: #FFD600;
    --yellow-light: #FFF176;
    --white: #FFFFFF;
    --jelly-shadow: 0 8px 32px rgba(139,92,246,0.22), 0 2px 8px rgba(251,113,133,0.15);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; }

  body {
    min-height: 100vh; height: 100%;
    font-family: 'Microsoft YaHei', '微软雅黑', sans-serif;
    display: flex; align-items: center; justify-content: center;
    text-align: center; position: relative;
    background: #1a0a2e;
    overflow: hidden;
  }

  /* ── Canvas 背景 ── */
  #bgCanvas {
    position: fixed; inset: 0; width: 100%; height: 100%; z-index: 0;
  }

  /* ── 全局覆盖层：暗色压暗 ── */
  .dim-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0); pointer-events: none;
    transition: background 0.4s ease;
    z-index: 5;
  }
  .dim-overlay.active { background: rgba(0,0,0,0.35); pointer-events: none; }

  /* ── bg bubbles ── */
  .bg-bubble {
    position: fixed; border-radius: 50%; pointer-events: none;
    animation: floatBubble 7s ease-in-out infinite;
  }
  .bg-bubble:nth-child(1){width:300px;height:300px;background:rgba(139,92,246,0.12);top:-80px;left:-80px;}
  .bg-bubble:nth-child(2){width:200px;height:200px;background:rgba(251,113,133,0.1);bottom:-60px;right:-60px;animation-delay:2.5s;}
  .bg-bubble:nth-child(3){width:150px;height:150px;background:rgba(99,102,241,0.1);top:40%;right:-50px;animation-delay:4.5s;}
  @keyframes floatBubble{0%,100%{transform:translateY(0) scale(1);}50%{transform:translateY(-18px) scale(1.04);}}

  /* ══════════════════════════════
     PAGES
  ══════════════════════════════ */
  .page {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    text-align: center;
    padding: 28px 20px;
    z-index: 10;
    opacity: 0; pointer-events: none;
    transition: opacity 0.4s ease;
  }
  .page.active { opacity: 1; pointer-events: all; }

  /* ── 通用标题 ── */
  .page-title {
    font-family: 'Microsoft YaHei', '微软雅黑', sans-serif;
    font-size: clamp(24px, 6vw, 37px);
    font-weight: 900; letter-spacing: 2px;
    color: var(--white);
    text-shadow: 0 0 18px rgba(139,92,246,0.8), 0 0 36px rgba(251,113,133,0.4);
    text-align: center; margin-bottom: clamp(28px,6vh,44px);
    line-height: 1.4; width: 100%;
  }
  /* role-title line-height */
  .role-title-outer { line-height: 1.65; letter-spacing: 1px; }
  .page-title .sub {
    display: block;
    font-size: clamp(13px,3vw,17px);
    font-weight: 400; opacity: 0.75;
    margin-top: 8px; letter-spacing: 1px;
  }

  /* ── 两个等大泡泡框 ── */
  .bubbles-row {
    display: flex; gap: clamp(14px,3vw,22px);
    width: 100%; max-width: 500px;
    align-items: stretch; justify-content: center;
    margin-bottom: clamp(28px,6vh,44px);
  }

  .bubble-card {
    flex: 1;
    min-height: clamp(120px,26vw,160px);
    background: rgba(255,255,255,0.06);
    border-radius: 22px;
    border: 2.5px solid rgba(255,255,255,0.55);
    box-shadow: 0 0 12px rgba(139,92,246,0.35), var(--jelly-shadow);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    position: relative; overflow: hidden;
    transition: all 0.22s ease;
    backdrop-filter: blur(6px);
  }
  .bubble-card::before {
    content:''; position:absolute; top:0; left:0; right:0; height:4px;
    background: linear-gradient(90deg, var(--purple), var(--rose), var(--yellow));
  }
  .bubble-card:nth-child(1) { animation: floatA 2.4s ease-in-out infinite; }
  .bubble-card:nth-child(2) { animation: floatB 2.4s ease-in-out infinite; }
  @keyframes floatA{0%,100%{transform:translateY(0);}50%{transform:translateY(-10px);}}
  @keyframes floatB{0%,100%{transform:translateY(-10px);}50%{transform:translateY(0);}}

  .bubble-card:hover { box-shadow: 0 14px 44px rgba(139,92,246,0.35); }
  .bubble-card.selected {
    border-color: var(--yellow);
    box-shadow: 0 0 0 3px rgba(255,214,0,0.5), 0 0 20px rgba(255,214,0,0.3), var(--jelly-shadow);
    background: rgba(255,214,0,0.08);
    animation: none !important;
    transform: scale(1.05);
  }

  .bubble-label {
    font-family: 'Microsoft YaHei', '微软雅黑', sans-serif;
    font-size: clamp(18px,4.5vw,26px);
    font-weight: 900; color: rgba(255,255,255,0.95);
    text-align: center; padding: clamp(16px,4vw,24px);
    line-height: 1.3;
    text-shadow: 0 0 16px rgba(196,181,253,0.7);
    display: flex; flex-direction: column; align-items: center; gap: 6px;
  }
  .bubble-card.selected .bubble-label { color: var(--yellow); }

  /* ── 确定按钮 ── */
  .confirm-btn {
    background: linear-gradient(135deg, var(--purple) 0%, #A78BFA 40%, var(--yellow) 100%);
    color: white; border: none; border-radius: 50px;
    padding: clamp(13px,3vw,18px) clamp(40px,10vw,70px);
    font-family: 'Microsoft YaHei', '微软雅黑', sans-serif;
    font-size: clamp(15px,3.5vw,20px); font-weight: 700; letter-spacing: 2px;
    cursor: pointer;
    box-shadow: 0 6px 0 #5B21B6, 0 10px 28px rgba(139,92,246,0.45);
    transition: all 0.15s; position: relative; overflow: hidden;
    opacity: 0; pointer-events: none;
    transform: translateY(8px);
    transition: opacity 0.3s ease, transform 0.3s ease, box-shadow 0.15s, background 0.15s;
  }
  .confirm-btn::before{content:'';position:absolute;top:0;left:0;right:0;height:50%;background:rgba(255,255,255,0.2);border-radius:50px 50px 0 0;}
  .confirm-btn.visible { opacity:1; pointer-events:all; transform:translateY(0); }
  .confirm-btn:hover { transform:translateY(-2px); box-shadow:0 8px 0 #5B21B6,0 14px 36px rgba(139,92,246,0.55); }
  .confirm-btn:active { transform:translateY(3px); box-shadow:0 3px 0 #5B21B6; }

  /* ══════════════════════════════
     PAGE 4 — 特征卡弹窗
  ══════════════════════════════ */
  .draw-section {
    display: flex; flex-direction: column; align-items: center;
    gap: clamp(28px,6vh,44px); width: 100%; max-width: 480px;
    text-align: center;
  }
  .draw-hint {
    color: rgba(255,255,255,0.75);
    font-size: clamp(13px,3vw,16px); letter-spacing: 1px;
    animation: floatHint 2.8s ease-in-out infinite;
  }
  @keyframes floatHint{0%,100%{transform:translateY(0);opacity:1;}50%{transform:translateY(-5px);opacity:0.8;}}

  .draw-btn {
    background: linear-gradient(135deg, var(--indigo), var(--purple), var(--yellow));
    color: white; border: none; border-radius: 50px;
    padding: clamp(14px,3.5vw,20px) clamp(44px,11vw,76px);
    font-family: 'Microsoft YaHei', '微软雅黑', sans-serif;
    font-size: clamp(16px,4vw,22px); font-weight: 700; letter-spacing: 2px;
    cursor: pointer;
    box-shadow: 0 6px 0 #4338CA, 0 10px 28px rgba(99,102,241,0.45);
    transition: all 0.15s; position: relative; overflow: hidden;
  }
  .draw-btn::before{content:'';position:absolute;top:0;left:0;right:0;height:50%;background:rgba(255,255,255,0.2);border-radius:50px 50px 0 0;}
  .draw-btn:hover{transform:translateY(-2px);box-shadow:0 8px 0 #4338CA,0 14px 36px rgba(99,102,241,0.55);}
  .draw-btn:active{transform:translateY(3px);box-shadow:0 3px 0 #4338CA;}

  /* ── 特征卡弹窗 ── */
  .card-overlay {
    position: fixed; inset: 0;
    background: rgba(10,4,30,0.75);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 50; opacity: 0; pointer-events: none;
    transition: opacity 0.2s ease;
    padding: 24px;
  }
  .card-overlay.show { opacity: 1; pointer-events: all; }

  .card-popup {
    background: white; border-radius: 28px;
    padding: clamp(28px,6vw,44px) clamp(24px,5vw,40px);
    max-width: 420px; width: 100%;
    box-shadow: 0 0 0 6px rgba(139,92,246,0.3), 0 20px 60px rgba(139,92,246,0.4);
    transform: scale(0.85);
    transition: transform 0.25s cubic-bezier(0.34,1.56,0.64,1);
    display: flex; flex-direction: column; align-items: center; gap: clamp(14px,3vh,20px);
  }
  .card-overlay.show .card-popup { transform: scale(1); }

  .card-tag {
    font-family: 'Microsoft YaHei', '微软雅黑', sans-serif;
    font-size: clamp(11px,2.5vw,13px); font-weight: 700;
    color: var(--purple); letter-spacing: 3px; opacity: 0.8;
  }
  .card-emoji { font-size: clamp(44px,11vw,60px); line-height: 1; }
  .card-text {
    font-family: 'Microsoft YaHei', '微软雅黑', sans-serif;
    font-size: 24px; font-weight: 900;
    color: #2D1B69; line-height: 1.6; text-align: center;
    width: 100%;
  }
  .card-instruction {
    font-family: 'Microsoft YaHei', '微软雅黑', sans-serif;
    font-size: clamp(12px,2.8vw,15px); color: #6B4FA0;
    line-height: 1.8; text-align: center; margin-top: 4px;
  }
  .card-instruction .en {
    font-family: Arial, sans-serif;
    font-weight: 900; color: var(--purple);
    display: block; margin-top: 10px;
    font-size: 23px;
    text-shadow: 0 0 12px rgba(139,92,246,0.3);
    letter-spacing: 1px;
  }

  .card-secondary {
    font-family: 'Microsoft YaHei', '微软雅黑', sans-serif;
    font-size: clamp(11px,2.6vw,14px);
    color: #8B6DC0;
    line-height: 1.8; text-align: center;
    margin-top: 4px;
    padding: 10px 16px;
    background: rgba(139,92,246,0.07);
    border-radius: 12px;
    width: 100%;
  }
  .tap-dismiss {
    color: rgba(255,255,255,0.6);
    font-size: clamp(11px,2.5vw,13px); letter-spacing: 2px;
    margin-top: 16px; text-align: center;
    animation: blink 1.8s ease-in-out infinite;
  }
  @keyframes blink{0%,100%{opacity:1;}50%{opacity:0.62;}}

  /* ══════════════════════════════
     PAGE 5 — 协力二：舞台打光
  ══════════════════════════════ */
  #page-coop2 {
    background: transparent;
  }
  .stage-bg {
    position: fixed; inset: 0; z-index: 8;
    background:
      radial-gradient(ellipse 60% 80% at 50% 0%, rgba(139,92,246,0.45) 0%, transparent 70%),
      radial-gradient(ellipse 40% 60% at 20% 100%, rgba(251,113,133,0.3) 0%, transparent 60%),
      radial-gradient(ellipse 40% 60% at 80% 100%, rgba(99,102,241,0.3) 0%, transparent 60%),
      linear-gradient(180deg, #0a0418 0%, #150828 60%, #0d041e 100%);
    pointer-events: none;
    opacity: 0; transition: opacity 0.5s ease;
  }
  .stage-bg.active { opacity: 1; }

  /* 舞台光束 */
  .stage-beam {
    position: fixed; pointer-events: none;
    bottom: 0; width: 3px;
    background: linear-gradient(to top, rgba(139,92,246,0.6) 0%, transparent 100%);
    transform-origin: bottom center;
    opacity: 0; transition: opacity 0.5s ease;
    z-index: 9;
  }
  .stage-beam.active { opacity: 1; }
  .stage-beam:nth-child(1){left:25%;height:85vh;transform:rotate(-12deg);background:linear-gradient(to top,rgba(139,92,246,0.5),transparent);}
  .stage-beam:nth-child(2){left:50%;height:90vh;transform:rotate(0deg);background:linear-gradient(to top,rgba(251,113,133,0.4),transparent);}
  .stage-beam:nth-child(3){left:75%;height:85vh;transform:rotate(12deg);background:linear-gradient(to top,rgba(99,102,241,0.5),transparent);}

  .stage-content {
    position: relative; z-index: 11;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    text-align: center;
    gap: clamp(28px,6vh,44px);
    padding: 32px 24px;
    width: 100%;
  }

  .stage-title {
    font-family: 'Microsoft YaHei', '微软雅黑', sans-serif;
    font-size: clamp(13px,3vw,16px); font-weight: 700;
    color: rgba(255,255,255,0.55); letter-spacing: 3px; text-align: center;
  }

  .stage-main-text {
    font-family: 'Microsoft YaHei', '微软雅黑', sans-serif;
    font-size: clamp(22px,6vw,36px); font-weight: 900;
    color: white; text-align: center; line-height: 1.7;
    text-shadow:
      0 0 20px rgba(255,214,0,0.8),
      0 0 40px rgba(139,92,246,0.7),
      0 0 80px rgba(251,113,133,0.4);
    animation: glowPulse 2.5s ease-in-out infinite;
    letter-spacing: 1px;
    width: 100%; display: block;
  }
  @keyframes glowPulse{
    0%,100%{text-shadow:0 0 20px rgba(255,214,0,0.8),0 0 40px rgba(139,92,246,0.7),0 0 80px rgba(251,113,133,0.4);}
    50%{text-shadow:0 0 40px rgba(255,214,0,1),0 0 70px rgba(139,92,246,0.9),0 0 120px rgba(251,113,133,0.6);}
  }

  .stage-float {
    animation: stageFloat 3s ease-in-out infinite;
  }
  @keyframes stageFloat{
    0%,100%{transform:translateY(0);}
    50%{transform:translateY(-12px);}
  }


  .stage-secondary {
    font-family: 'Microsoft YaHei', '微软雅黑', sans-serif;
    font-size: clamp(13px,3vw,16px);
    color: rgba(255,255,255,0.72);
    line-height: 1.9; text-align: center;
    letter-spacing: 0.5px;
    animation: blink 3.2s ease-in-out infinite;
  }
  .stage-secondary-em {
    display: block; margin-top: 6px;
    font-weight: 700;
    color: var(--yellow-light);
    text-shadow: 0 0 12px rgba(255,214,0,0.5);
  }
  .back-btn {
    background: rgba(255,255,255,0.12);
    border: 1.5px solid rgba(255,255,255,0.3);
    color: rgba(255,255,255,0.7);
    border-radius: 50px;
    padding: clamp(10px,2.5vw,14px) clamp(28px,7vw,48px);
    font-family: 'Microsoft YaHei', '微软雅黑', sans-serif;
    font-size: clamp(13px,3vw,16px); font-weight: 700; letter-spacing: 2px;
    cursor: pointer; transition: all 0.2s;
    backdrop-filter: blur(8px);
  }
  .back-btn:hover { background: rgba(255,255,255,0.2); color: white; }



  /* kw-grad: 继承父级白色发光，无需单独设置 */
  .kw-grad { color: #FFFFFF; font-weight: 900; }


  /* 标题：整体居中，发光同协力二 */
  .role-title-outer {
    width: 100%;
    text-align: center;
    display: block;
  }
  .role-title-inner {
    display: inline-block;
    text-align: left;
    white-space: nowrap;
    /* 发光效果同协力二主文字 */
    text-shadow:
      0 0 20px rgba(255,214,0,0.75),
      0 0 40px rgba(139,92,246,0.6),
      0 0 80px rgba(251,113,133,0.35);
  }
  .role-line1 { display: inline; white-space: nowrap; }
  .role-line2 { display: inline; white-space: nowrap; }

  @media (max-width: 520px) {
    .role-title-inner {
      white-space: normal;
      display: inline-block;
      text-align: left;
    }
    .role-line1 { display: block; white-space: nowrap; }
    .role-line2 { display: block; white-space: nowrap; padding-left: 2em; }
  }

  /* 制作人/小偶像 渐变文字 + 发光 */
  .role-label {
    display: flex; flex-direction: column; align-items: center; gap: 6px;
    padding: clamp(16px,4vw,24px);
  }
  .role-grad {
    font-size: clamp(20px,5vw,28px); font-weight: 900;
    background: linear-gradient(135deg, #C4B5FD 0%, #A78BFA 30%, #FFD600 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    filter: drop-shadow(0 0 8px rgba(196,181,253,0.7)) drop-shadow(0 0 20px rgba(255,214,0,0.4));
    display: block; text-align: center;
  }
  .role-sub {
    font-size: clamp(11px,2.5vw,14px); font-weight: 500;
    color: #C4B5FD; letter-spacing: 1px;
  }


  /* 返回按钮 亮色变体（page-role用） */
  .back-btn-light {
    background: rgba(139,92,246,0.12);
    border: 1.5px solid rgba(139,92,246,0.4);
    color: rgba(196,181,253,0.9);
  }
  .back-btn-light:hover { background: rgba(139,92,246,0.22); color: #C4B5FD; }
  /* star particles */
  .star{position:fixed;font-size:20px;animation:starFloat 1s ease-out forwards;pointer-events:none;z-index:300;}
  @keyframes starFloat{0%{transform:translateY(0) scale(0) rotate(0deg);opacity:1;}100%{transform:translateY(-120px) scale(1.3) rotate(180deg);opacity:0;}}
</style>
</head>
<body>

<canvas id="bgCanvas"></canvas>
<div class="dim-overlay" id="dimOverlay"></div>

<!-- 舞台背景（协力二专用） -->
<div class="stage-bg" id="stageBg"></div>
<div class="stage-beam" id="beam1"></div>
<div class="stage-beam" id="beam2"></div>
<div class="stage-beam" id="beam3"></div>

<div class="bg-bubble"></div>
<div class="bg-bubble"></div>
<div class="bg-bubble"></div>

<!-- ══ PAGE 1：选择协力一/二 ══ -->
<div class="page active" id="page-home">
  <div class="page-title">
    ✦ 打协力吗 ✦
    <span class="sub">选择你的协力任务</span>
  </div>
  <div class="bubbles-row">
    <div class="bubble-card" id="btn-coop1" onclick="selectHome('coop1')">
      <div class="bubble-label">协力一</div>
    </div>
    <div class="bubble-card" id="btn-coop2" onclick="selectHome('coop2')">
      <div class="bubble-label">协力二</div>
    </div>
  </div>
  <button class="confirm-btn" id="confirm-home" onclick="confirmHome()">确定</button>
</div>

<!-- ══ PAGE 2：制作人 or 小偶像（协力一） ══ -->
<div class="page" id="page-role">
  <div class="page-title role-title-outer">
    <span class="role-title-inner">
      <span class="role-line1">今天是「制作人」</span><span class="role-line2">还是「小偶像」？</span>
    </span>
  </div>
  <div class="bubbles-row">
    <div class="bubble-card" id="btn-producer" onclick="selectRole('producer')">
      <div class="bubble-label">
        制作人
        <span class="role-sub">原皮</span>
      </div>
    </div>
    <div class="bubble-card" id="btn-idol" onclick="selectRole('idol')">
      <div class="bubble-label">
        小偶像
        <span class="role-sub">Cos</span>
      </div>
    </div>
  </div>
  <button class="confirm-btn" id="confirm-role" onclick="confirmRole()">确定</button>
  <button class="back-btn back-btn-light" style="margin-top: clamp(28px,6vh,44px);" onclick="goHome()">← 返回首页</button>
</div>

<!-- ══ PAGE 3：抽特征卡 ══ -->
<div class="page" id="page-draw">
  <div class="page-title">抽取特征卡</div>
  <div class="draw-section">
    <div class="draw-hint">点击按钮随机抽取一张特征卡</div>
    <button class="draw-btn" onclick="drawCard()">抽卡</button>
    <button class="back-btn" style="margin-top:8px;" onclick="goHome()">← 返回首页</button>
  </div>
</div>

<!-- ══ PAGE 4：协力二提示 ══ -->
<div class="page" id="page-coop2">
  <div class="stage-content">
    <div class="stage-title">✦ 协力二 ✦</div>
    <div class="stage-float">
      <div class="stage-main-text">以前辈的经验<br>模仿卡面<br>分分钟的事情</div>
    </div>
    <div class="stage-secondary">
      从协力二的卡牌中随机抽取一张<br>
      还原卡面姿势，请勿带走卡牌哦<br>
      <span class="stage-secondary-em">拍下照片回来找 Staff 认证完成挑战～</span>
    </div>
    <button class="back-btn" onclick="goHome()">← 返回首页</button>
  </div>
</div>

<!-- ══ 特征卡弹窗 ══ -->
<div class="card-overlay" id="cardOverlay" onclick="dismissCard()">
  <div class="card-popup" onclick="event.stopPropagation()">
    <div class="card-tag">✦ 特征卡 ✦</div>
    <div class="card-emoji" id="cardEmoji">🎯</div>
    <div class="card-text" id="cardText">特征卡内容</div>
    <div class="card-instruction">
      请寻找符合特征的TA带回判定区，然后喊出
      <span class="en">ENSEMBLE STARS, GO!</span>
    </div>
    <div class="card-secondary">
      📸 记得截图这张特征卡<br>
      完成挑战后带截图找 Staff 认证～
    </div>
  </div>
  <div class="tap-dismiss">点击任意位置返回首页</div>
</div>

<script>
/* ── 背景星空粒子 ── */
(function(){
  const canvas = document.getElementById('bgCanvas');
  const ctx = canvas.getContext('2d');
  let W, H;
  const stars = [];

  function resize(){
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  for(let i=0;i<120;i++){
    stars.push({
      x: Math.random(),
      y: Math.random(),
      r: Math.random()*2.5+0.3,
      speed: Math.random()*0.0002+0.00005,
      phase: Math.random()*Math.PI*2,
      color: Math.random()<0.5 ? '#C4B5FD' : '#FECDD3',
    });
  }

  function draw(ts){
    ctx.clearRect(0,0,W,H);
    // deep space gradient
    const g = ctx.createLinearGradient(0,0,0,H);
    g.addColorStop(0,'#0d0420');
    g.addColorStop(1,'#1a0a2e');
    ctx.fillStyle = g; ctx.fillRect(0,0,W,H);

    stars.forEach(s=>{
      const blink = 0.5 + 0.5*Math.sin(ts*s.speed*6000 + s.phase);
      ctx.beginPath();
      ctx.arc(s.x*W, s.y*H, s.r*(0.7+0.3*blink), 0, Math.PI*2);
      ctx.fillStyle = s.color;
      ctx.globalAlpha = 0.3 + 0.7*blink;
      ctx.fill();
    });
    ctx.globalAlpha = 1;
    requestAnimationFrame(draw);
  }
  requestAnimationFrame(draw);
})();

/* ── 题库 ── */
const producerCards = [
  { emoji:'💜', text:'找到一位你推的小偶像' },
  { emoji:'👗', text:'找到一位和你同色系穿搭的小偶像 / 制作人' },
  { emoji:'🎒', text:'找到一位拿着痛包的小偶像 / 制作人' },
  { emoji:'🧸', text:'找到一位带着娃的小偶像 / 制作人' },
  { emoji:'🎩', text:'找到一位戴帽子的小偶像 / 制作人' },
  { emoji:'👓', text:'找到一位戴眼镜的小偶像 / 制作人' },
];
const idolCards = [
  { emoji:'🎵', text:'找到和你同队伍的小偶像' },
  { emoji:'✨', text:'找到和你穿同一系列服装的小偶像' },
  { emoji:'💇', text:'找到和你同一发色的小偶像' },
  { emoji:'👁️', text:'找到和你眼睛颜色一样的小偶像' },
  { emoji:'📏', text:'找到比你个子高的小偶像' },
  { emoji:'🌸', text:'找到比你个子矮的小偶像' },
];

/* ── 状态 ── */
let homeChoice = null;   // 'coop1' | 'coop2'
let roleChoice = null;   // 'producer' | 'idol'

/* ── 页面切换 ── */
function showPage(id){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('page-'+id).classList.add('active');
  // 协力二：开启舞台灯光
  const isCoop2 = id==='coop2';
  document.getElementById('stageBg').classList.toggle('active', isCoop2);
  ['beam1','beam2','beam3'].forEach(b=>document.getElementById(b).classList.toggle('active',isCoop2));
}

/* ── Page 1 ── */
function selectHome(choice){
  homeChoice = homeChoice===choice ? null : choice;
  document.getElementById('btn-coop1').classList.toggle('selected', homeChoice==='coop1');
  document.getElementById('btn-coop2').classList.toggle('selected', homeChoice==='coop2');
  document.getElementById('confirm-home').classList.toggle('visible', homeChoice!==null);
}
function confirmHome(){
  if(!homeChoice) return;
  if(homeChoice==='coop1') showPage('role');
  else showPage('coop2');
  spawnStars();
}

/* ── Page 2 ── */
function selectRole(choice){
  roleChoice = roleChoice===choice ? null : choice;
  document.getElementById('btn-producer').classList.toggle('selected', roleChoice==='producer');
  document.getElementById('btn-idol').classList.toggle('selected', roleChoice==='idol');
  document.getElementById('confirm-role').classList.toggle('visible', roleChoice!==null);
}
function confirmRole(){
  if(!roleChoice) return;
  showPage('draw');
  spawnStars();
}

/* ── Page 3：抽卡 ── */
function drawCard(){
  const pool = roleChoice==='producer' ? producerCards : idolCards;
  const card = pool[Math.floor(Math.random()*pool.length)];
  document.getElementById('cardEmoji').textContent = card.emoji;
  // 在"的小偶像"或"的制作人"前分行
  const displayText = card.text.replace(/(的小偶像|\/\s*制作人|的制作人)/, '<br>$1');
  document.getElementById('cardText').innerHTML = displayText;
  document.getElementById('dimOverlay').classList.add('active');
  setTimeout(()=>{ document.getElementById('cardOverlay').classList.add('show'); }, 150);
  spawnStars();
}

function dismissCard(){
  document.getElementById('cardOverlay').classList.remove('show');
  document.getElementById('dimOverlay').classList.remove('active');
  goHome();
}

/* ── 返回首页 ── */
function goHome(){
  homeChoice=null; roleChoice=null;
  document.getElementById('btn-coop1').classList.remove('selected');
  document.getElementById('btn-coop2').classList.remove('selected');
  document.getElementById('btn-producer').classList.remove('selected');
  document.getElementById('btn-idol').classList.remove('selected');
  document.getElementById('confirm-home').classList.remove('visible');
  document.getElementById('confirm-role').classList.remove('visible');
  document.getElementById('cardOverlay').classList.remove('show');
  document.getElementById('dimOverlay').classList.remove('active');
  showPage('home');
}

function spawnStars(){
  for(let i=0;i<6;i++) setTimeout(()=>{
    const s=document.createElement('div'); s.className='star';
    s.textContent=['⭐','✨','💫','🌟','🎵','💜'][Math.floor(Math.random()*6)];
    s.style.left=(15+Math.random()*70)+'vw';
    s.style.top=(20+Math.random()*60)+'vh';
    s.style.animationDelay=Math.random()*0.3+'s';
    document.body.appendChild(s); setTimeout(()=>s.remove(),1200);
  },i*100);
}
</script>
</body>
</html>
